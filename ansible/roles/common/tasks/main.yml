---

- name: 安装 Docker 和基础工具
  block:
    # Debian/Ubuntu - 直接用系统包
    - name: 安装 Docker (Debian/Ubuntu)
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose
        state: present
        update_cache: yes
      when: ansible_facts.os_family == "Debian"
      register: docker_install_result

    # RedHat/CentOS/AlmaLinux/Rocky - 先加官方仓库
    - name: 添加 Docker 官方仓库 (RedHat系)
      ansible.builtin.yum_repository:
        name: docker-ce-stable
        description: Docker CE Stable
        baseurl: "https://download.docker.com/linux/centos/{{ ansible_facts.distribution_major_version }}/$basearch/stable"
        gpgkey: https://download.docker.com/linux/centos/gpg
        gpgcheck: yes
        enabled: yes
      become: yes
      when: ansible_facts.os_family == "RedHat"

    - name: 安装 Docker (RedHat系)
      ansible.builtin.yum:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
      become: yes
      when: ansible_facts.os_family == "RedHat"
      register: docker_install_result

  rescue:
    # 如果上面失败，尝试用你本地的 docker.io
    - name: 尝试安装 docker.io (备用)
      ansible.builtin.package:
        name:
          - docker.io
          - docker-compose
        state: present
      become: yes
      ignore_errors: yes
      register: docker_install_result

- name: 启动 Docker
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: yes
  become: yes
  when: 
    - not (docker_install_result.skipped | default(false))

- name: 用户加入 docker 组
  ansible.builtin.user:
    name: "{{ ansible_user_id }}"
    groups: docker
    append: yes
  become: yes
  when: 
    - not (docker_install_result.skipped | default(false))
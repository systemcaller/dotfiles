---

# 1. 检查是否已有备份，防止重复执行时把已经生成的软链接给打包了
- name: 检查是否已有初始备份
  ansible.builtin.find:
    paths: "{{ ansible_facts['user_dir'] }}"
    patterns: "dotfiles_backup_*.tar.gz"
  register: existing_backups

# 2. 直接打包列表中的文件（使用内置日期 Fact）
- name: 备份原始文件
  community.general.archive:
    # 直接将列表文件名补全为家目录绝对路径
    path: "{{ dotfiles_to_link | map('regex_replace', '^(.*)$', ansible_facts['user_dir'] ~ '/\\1') | list }}"
    dest: "{{ ansible_facts['user_dir'] }}/dotfiles_backup_{{ ansible_facts['date_time']['date'] }}.tar.gz"
    format: gz
    force_archive: yes
  # 只有当 find 没找到任何备份包时才运行
  when: existing_backups.matched == 0


# 3. 批量创建自定义软链接（支持任意 src → dest 映射）
- name: 批量创建 Dotfiles 软链接
  ansible.builtin.file:
    src: "{{ ansible_facts['user_dir'] }}/.dotfiles/{{ item.src }}"   # 源：dotfiles 里的文件
    path: "{{ ansible_facts['user_dir'] }}/{{ item.dest }}"  # 目标：系统路径
    state: link
    force: true                # 强制覆盖（已存在文件直接变软链接）
    follow: false              # 不追踪旧链接
  loop: "{{ dotfiles_symlinks }}"
  loop_control:
    label: "链接 {{ item.src }} → {{ item.dest }}"